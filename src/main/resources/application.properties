spring.application.name=BlogBackend

# Database connection settings (Docker-friendly)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:blog_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:3519}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# JWT settings
jwt.secret=${JWT_SECRET:RidvanKarsliBlogBackendSuperSecretKeyForJwtAuthentication2026!}
jwt.expiration=86400000
jwt.cookie-name=blog_jwt

# File upload settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
media.upload-dir=uploads

# Storage type: local or s3
storage.type=${STORAGE_TYPE:local}
storage.access-key=${STORAGE_ACCESS_KEY:}
storage.secret-key=${STORAGE_SECRET_KEY:}
storage.bucket=${STORAGE_BUCKET:}
storage.region=${STORAGE_REGION:us-east-1}
storage.endpoint=${STORAGE_ENDPOINT:}
storage.public-url-prefix=${STORAGE_PUBLIC_URL_PREFIX:/uploads}

# Site settings
site.base-url=${SITE_BASE_URL:http://localhost}

# Flyway settings
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
